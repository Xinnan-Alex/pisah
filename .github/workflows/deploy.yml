# Deploy the Go server via GitHub Actions OIDC (no static AWS keys).
#
# One-time setup:
#   1. terraform apply  →  note output github_actions_role_arn
#   2. Set AWS_ROLE_ARN below (or add a repo variable with the same name)
#   3. Repo secrets for Supabase migrations (Settings → Secrets → Actions):
#        SUPABASE_ACCESS_TOKEN  — https://supabase.com/dashboard/account/tokens
#        SUPABASE_PROJECT_ID    — project ref from dashboard URL
#        SUPABASE_DB_PASSWORD   — database password for that project
#
# IAM role trust is scoped to repo:ref:refs/heads/main — merge to main to deploy.
# Pending supabase/migrations are applied before the new image rolls out.

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "web/**"
      - "supabase/migrations/**"
      - "Dockerfile.release"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: ap-southeast-1
  AWS_ROLE_ARN: arn:aws:iam::501519530452:role/pisah-github-actions
  ECR_REPOSITORY: 501519530452.dkr.ecr.ap-southeast-1.amazonaws.com/pisah
  ECS_CLUSTER: pisah
  ECS_SERVICE: pisah

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply Supabase migrations
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: Cross-compile linux/arm64 binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o pisah .

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REPOSITORY }}:latest

      - name: Roll ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
