{{define "friend/pick.html"}}
<div x-data="friendPick()" data-pick-b64="{{b64json .Pick}}" style="flex:1;display:flex;flex-direction:column">
  <header class="pad" style="padding-top:24px;padding-bottom:10px;background:var(--surface)">
    <h2 class="display" style="font-size:20px">Hi {{.Me}} 👋</h2>
    <div class="muted" style="font-size:13px;margin-top:2px">Tap the items you ordered</div>
  </header>
  <div class="items">
    <template x-for="it in items" :key="it.id">
      <div>
        <!-- Item nobody else has claimed: simple tap-to-add toggle -->
        <template x-if="others(it).length === 0">
          <button type="button" class="tap item" :class="{'selected': isSelected(it.id)}" @click="toggle(it.id)">
            <span class="check" aria-hidden="true"><span class="tick" x-show="isSelected(it.id)"></span></span>
            <span style="flex:1;min-width:0">
              <span style="display:block;font:700 14px var(--font)" x-text="it.name"></span>
              <span class="muted" style="display:block;font-size:11px" x-text="formatRM(it.lineTotalSen)"></span>
            </span>
            <span style="font:700 12px var(--font);color:var(--ink)" x-show="isSelected(it.id)">You</span>
          </button>
        </template>
        <!-- Item already claimed by others: shared card with who's on it + join pill -->
        <template x-if="others(it).length > 0">
          <div class="shared-item" :class="{'in': isSelected(it.id)}">
            <div class="shared-item-head">
              <span style="display:flex;align-items:center;min-width:0">
                <span class="shared-tag">SHARED</span>
                <span style="font:700 14px var(--font);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="it.name"></span>
              </span>
              <span class="muted" style="font:600 12px var(--font);white-space:nowrap" x-text="formatRM(it.lineTotalSen)"></span>
            </div>
            <div class="shared-item-foot">
              <span style="display:flex;align-items:center;min-width:0">
                <template x-for="(n, idx) in others(it)" :key="n">
                  <span class="mini-avatar" :style="'background:'+avatarColor(n)+(idx>0?';margin-left:-8px':'')" x-text="initial(n)"></span>
                </template>
                <span class="muted" style="font:500 11px var(--font);margin-left:9px;white-space:nowrap" x-text="splitWays(it)"></span>
              </span>
              <button type="button" class="tap shared-pill" :class="{'in': isSelected(it.id)}" @click="toggle(it.id)"
                :aria-pressed="isSelected(it.id)" x-text="isSelected(it.id) ? '✓ You\'re in' : '+ I\'m in'"></button>
            </div>
          </div>
        </template>
      </div>
    </template>
  </div>
  <div class="footer">
    <div class="footer-row">
      <div style="flex:1">
        <span class="muted" style="font-size:11px">Your share</span>
        <span class="display" style="display:block;font-size:19px" x-text="displayOwed"></span>
      </div>
      <a :href="'/r/{{.Slug}}/share'" class="btn btn-sm tap">Continue →</a>
    </div>
  </div>
</div>
{{end}}
