{{define "owner/share.html"}}
<div class="pad" style="flex:1;display:flex;flex-direction:column;padding-top:16px;padding-bottom:28px">
  <div class="topbar" style="padding:0 0 16px;background:transparent">
    <a href="/capture" class="back-chip tap" aria-label="Back">←</a>
    <a href="/capture" class="link">New split</a>
  </div>

  <div style="text-align:center;margin:20px 0">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--peach);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;color:var(--green)">✓</div>
    <h1 class="display" style="font-size:25px">Split is ready!</h1>
    <p class="muted" style="font-size:13px;margin-top:8px;line-height:1.5">Send this link to friends so they can pick their items and pay you back.</p>
  </div>

  <div class="card" style="margin-bottom:14px">
    <label class="hint" style="font-size:11px;display:block;margin-bottom:8px">Share link</label>
    <div style="display:flex;gap:8px;align-items:center">
      <input readonly value="{{.ShareURL}}" id="share-url" style="background:var(--cream);font-size:13px;padding:12px">
      <button type="button" class="btn btn-sm tap" onclick="copyShareLink(document.getElementById('share-url').value)" id="copy-msg">Copy link</button>
    </div>
    <button type="button" class="btn tap" style="margin-top:12px" onclick="shareNative('{{.ShareURL}}','Split the bill with me on Pisah 👉 {{.ShareURL}}')">Share link</button>
  </div>

  <a href="/r/{{.Slug}}" class="preview-card tap">
    <span style="font-size:24px">👀</span>
    <span><strong>Preview the friend's view</strong><br><span class="hint" style="font-size:12px">See what friends will see</span></span>
  </a>

  <div style="flex:1"></div>
  <a href="/splits/{{.Slug}}/track" class="btn btn-outline tap" style="margin-top:20px">Track payments</a>
</div>
{{end}}
