{{define "owner/signup.html"}}
<div class="pad" style="flex:1;padding-top:80px;padding-bottom:40px">
  <div style="margin-bottom:32px">
    <h1 class="display" style="font-size:40px;font-weight:800">Pisah<span style="color:var(--orange)"> ·</span></h1>
    <p class="muted" style="font-size:14px;margin-top:6px">Create an account to start splitting</p>
  </div>
  {{if .Error}}
  <div role="alert" style="background:#FDEAE3;color:var(--orange);padding:12px 14px;border-radius:12px;margin-bottom:16px;font-size:13px;font-weight:600">{{.Error}}</div>
  {{end}}
  <form method="post" action="/signup">
    <label for="email" class="hint" style="display:block;font-size:12px;font-weight:600;margin-bottom:6px">Email</label>
    <input id="email" name="email" type="email" autocomplete="email" required value="{{.Email}}" style="margin-bottom:14px">
    <label for="password" class="hint" style="display:block;font-size:12px;font-weight:600;margin-bottom:6px">Password</label>
    <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6" style="margin-bottom:14px">
    <label for="password_confirm" class="hint" style="display:block;font-size:12px;font-weight:600;margin-bottom:6px">Confirm password</label>
    <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" required minlength="6" style="margin-bottom:18px">
    <button type="submit" class="btn">Create account</button>
  </form>
  <p class="hint" style="text-align:center;font-size:13px;margin-top:22px">
    Already have an account? <a href="/signin" class="tap" style="color:var(--green);font-weight:600">Sign in</a>
  </p>
</div>
{{end}}
