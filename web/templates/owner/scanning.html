{{define "owner/scanning.html"}}
<div class="pad" style="flex:1;display:flex;flex-direction:column;padding-top:20px">
  <div class="viewfinder" style="min-height:240px;margin-bottom:24px">
    <div class="scan-line" aria-hidden="true"></div>
    <div style="position:absolute;top:14px;right:14px;background:rgba(242,92,59,.15);padding:6px 12px;border-radius:999px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--orange)">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--orange);animation:sp .8s linear infinite"></span>
      AI reading
    </div>
  </div>
  <h2 class="display" style="font-size:23px">Reading your receipt…</h2>
  <p class="muted" style="font-size:13px;margin-top:6px">Hang tight, almost done</p>
  <div style="margin-top:24px">
    <div class="row"><span class="muted">Detect merchant</span><span style="color:var(--green)">✓</span></div>
    <div class="row"><span class="muted">Find line items</span><span class="spin" style="margin:0;width:18px;height:18px"></span></div>
    <div class="row"><span class="muted">Calculate SST &amp; service</span><span class="hint">…</span></div>
  </div>
</div>
{{end}}
