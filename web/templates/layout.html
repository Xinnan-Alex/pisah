{{define "layout.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBEFE8">
<title>{{if .Title}}{{.Title}}{{else}}Pisah · split the bill{{end}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Figtree:wght@400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css?v={{.Version}}">
<!-- app.js must load BEFORE Alpine so its alpine:init listeners register the
     components before Alpine auto-starts. -->
<script defer src="/static/app.js?v={{.Version}}"></script>
<script defer src="https://unpkg.com/htmx.org@2.0.4"></script>
<script defer src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
<script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body>
<div id="app" class="app-shell">
<div id="page" style="flex:1;display:flex;flex-direction:column;min-height:0">
{{.Content}}
</div>
</div>
</body>
</html>
{{end}}
